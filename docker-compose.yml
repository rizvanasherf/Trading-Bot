services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-bot-backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trading-bot-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
